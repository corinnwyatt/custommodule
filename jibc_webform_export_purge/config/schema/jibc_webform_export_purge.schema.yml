jibc_webform_export_purge.settings:
  type: config_object
  label: 'JIBC Webform Export & Purge settings'
  mapping:
    email_to:
      type: string
      label: 'Recipient email address(es)'
    email_subject:
      type: string
      label: 'Email subject line'
    email_body:
      type: string
      label: 'Email body text'
    webform_ids:
      type: sequence
      label: 'Webform IDs to export'
      sequence:
        type: string
        label: 'Webform ID'
    export_day:
      type: string
      label: 'Day of week to export'
    last_export:
      type: integer
      label: 'Timestamp of last export'
    enabled:
      type: boolean
      label: 'Enable export on cron'
